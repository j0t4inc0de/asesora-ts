<div
  class="flex-none w-full sm:w-[calc(50%-0.5rem)] lg:w-[calc(33.333%-0.7rem)] snap-start relative z-0"
>
  <a
    href="{% url 'detalle_servicio' servicio.id %}"
    class="block h-full group cursor-pointer outline-none focus:ring-2 focus:ring-teal-500 rounded-2xl"
  >
    <div
      class="bg-white rounded-2xl border border-slate-200 p-8 flex flex-col h-full transition-all duration-300 group-hover:-translate-y-1.5 group-hover:shadow-[0_10px_40px_-15px_rgba(13,148,136,0.2)] group-hover:border-teal-100 relative overflow-hidden"
    >
      <!-- Línea decorativa superior que aparece en hover -->
      <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-400 to-sky-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
      
      <div class="mb-4">
        <h3
          class="text-xl font-bold text-slate-800 transition-colors"
        >
          {{ servicio.nombre }}
        </h3>
      </div>

      <div class="flex-grow">
        <p
          class="text-sky-600 text-sm leading-relaxed line-clamp-4 overflow-hidden"
          style="text-align: justify;"
        >
          {{ servicio.descripcion }}
        </p>
      </div>

      <div
        class="flex items-center justify-between mt-auto pt-5 border-t border-slate-100"
      >
        <span class="text-teal-700 font-bold text-lg"
          >${{ servicio.precio }}</span
        >

        <div class="w-8 h-8 rounded-full bg-sky-50 flex items-center justify-center group-hover:bg-sky-500 transition-colors duration-300">
          <span
            class="material-symbols-outlined text-sky-400 group-hover:text-white text-sm transition-transform duration-300 group-hover:translate-x-0.5"
          >
            arrow_forward_ios
          </span>
        </div>
      </div>
    </div>
  </a>
</div>
