<div class="flex-none w-full sm:w-[calc(50%-0.5rem)] lg:w-[calc(33.333%-0.7rem)] snap-start">
  <div class="bg-white rounded-2xl shadow-ambient-low border border-surface-variant p-8 flex flex-col h-full hover:shadow-ambient-high transition-all duration-300 group">
    <div class="mb-4">
      <h3 class="text-xl font-bold text-teal-800 group-hover:text-teal-600 transition-colors">
        {{ servicio.nombre }}
      </h3>
    </div>
    
    <div class="flex-grow">
      <p class="text-gray-600 text-sm leading-relaxed line-clamp-4 overflow-hidden">
        {{ servicio.descripcion }}
      </p>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between">
      <span class="text-teal-700 font-bold text-lg">${{ servicio.precio }}</span>
      <span class="material-symbols-outlined text-teal-500 opacity-0 group-hover:opacity-100 transition-opacity">
        arrow_forward_ios
      </span>
    </div>
  </div>
