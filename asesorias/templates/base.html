<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AsesoraTS Chile - Asesoría Profesional con Sentido Humano</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#fe9d7a",
              background: "#f8f9fa",
              surface: "#f8f9fa",
              "on-error": "#ffffff",
              "tertiary-container": "#162f1d",
              "on-secondary-fixed-variant": "#763217",
              "surface-container-low": "#f3f4f5",
              "tertiary-fixed-dim": "#b0ceb4",
              "on-background": "#191c1d",
              "inverse-primary": "#b7c8de",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-fixed-variant": "#334d38",
              "primary-fixed": "#d2e4fb",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#4f6073",
              "on-secondary-fixed": "#380d00",
              "on-primary-fixed-variant": "#38485a",
              "surface-dim": "#d9dadb",
              "on-tertiary-container": "#7b9880",
              "surface-container-high": "#e7e8e9",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdbcf",
              "surface-variant": "#e1e3e4",
              "on-primary": "#ffffff",
              error: "#ba1a1a",
              secondary: "#94492c",
              "on-primary-container": "#8192a7",
              "primary-fixed-dim": "#b7c8de",
              "outline-variant": "#c4c6cd",
              "surface-bright": "#f8f9fa",
              "on-surface": "#191c1d",
              tertiary: "#021a0a",
              "on-surface-variant": "#44474c",
              "tertiary-fixed": "#cceacf",
              "on-error-container": "#93000a",
              "on-tertiary-fixed": "#062010",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#0b1d2d",
              "secondary-fixed-dim": "#ffb59b",
              primary: "#041627",
              "inverse-on-surface": "#f0f1f2",
              "error-container": "#ffdad6",
              "surface-container": "#edeeef",
              "on-secondary-container": "#773318",
              outline: "#74777d",
              "inverse-surface": "#2e3132",
              "primary-container": "#1a2b3c",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "2xl": "3rem",
              sm: "0.5rem",
              gutter: "1.5rem",
              unit: "4px",
              lg: "1.5rem",
              xl: "2rem",
              xs: "0.25rem",
              md: "1rem",
              "3xl": "4rem",
              "container-max": "1280px",
            },
            fontFamily: {
              manrope: ["Manrope", "sans-serif"],
            },
            fontSize: {
              h1: [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "label-md": [
                "14px",
                {
                  lineHeight: "1.4",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              "body-lg": [
                "18px",
                {
                  lineHeight: "1.6",
                  fontWeight: "400",
                },
              ],
              "body-md": [
                "16px",
                {
                  lineHeight: "1.5",
                  fontWeight: "400",
                },
              ],
              caption: [
                "12px",
                {
                  lineHeight: "1.4",
                  fontWeight: "400",
                },
              ],
              h3: [
                "24px",
                {
                  lineHeight: "1.3",
                  fontWeight: "600",
                },
              ],
              h2: [
                "36px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
            },
            keyframes: {
              shimmer: {
                "0%": { transform: "translateX(-150%) skewX(-15deg)" },
                "20%, 100%": { transform: "translateX(300%) skewX(-15deg)" },
              },
              sparkle: {
                "0%, 100%": { opacity: "0", transform: "scale(0) rotate(0deg)" },
                "50%": { opacity: "1", transform: "scale(1) rotate(15deg)" },
              }
            },
            animation: {
              shimmer: "shimmer 6s ease-in-out infinite",
              sparkle: "sparkle 4s ease-in-out infinite",
              "sparkle-delayed": "sparkle 4s ease-in-out infinite 2s",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .font-h1 {
          font-family: "Manrope", sans-serif;
        }
        .text-h1 {
          @apply text-[48px] leading-[1.2] tracking-[-0.02em] font-bold;
        }
        .font-h2 {
          font-family: "Manrope", sans-serif;
        }
        .text-h2 {
          @apply text-[36px] leading-[1.2] tracking-[-0.01em] font-bold;
        }
        .font-h3 {
          font-family: "Manrope", sans-serif;
        }
        .text-h3 {
          @apply text-[24px] leading-[1.3] font-semibold;
        }
        .font-body-lg {
          font-family: "Manrope", sans-serif;
        }
        .text-body-lg {
          @apply text-[18px] leading-[1.6] font-normal;
        }
        .font-body-md {
          font-family: "Manrope", sans-serif;
        }
        .text-body-md {
          @apply text-[16px] leading-[1.5] font-normal;
        }
        .font-label-md {
          font-family: "Manrope", sans-serif;
        }
        .text-label-md {
          @apply text-[14px] leading-[1.4] tracking-[0.01em] font-medium;
        }
        .font-caption {
          font-family: "Manrope", sans-serif;
        }
        .text-caption {
          @apply text-[12px] leading-[1.4] font-normal;
        }

        .shadow-ambient-low {
          box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .shadow-ambient-high {
          box-shadow:
            0 10px 15px -3px rgb(0 0 0 / 0.1),
            0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans">
    <nav
      class="fixed top-0 w-full z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm"
    >
      <div
        class="flex justify-between items-center px-8 h-20 max-w-7xl mx-auto"
      >
        <div
          class="text-xl font-extrabold text-[#1A2B3C] dark:text-white font-manrope tracking-tight"
        >
          AsesoraTS Chile
        </div>
        <div class="hidden md:flex items-center gap-8">
          <a
            class="text-slate-500 dark:text-slate-400 font-medium hover:text-[#1A2B3C] dark:hover:text-white transition-all duration-200 active:scale-95 transition-transform"
            href="#seccion-servicios"
            >Servicios</a
          >
          <a
            class="text-slate-500 dark:text-slate-400 font-medium hover:text-[#1A2B3C] dark:hover:text-white transition-all duration-200 active:scale-95 transition-transform"
            href="#"
            >Sobre mi</a
          >
          <a
            class="text-slate-500 dark:text-slate-400 font-medium hover:text-[#1A2B3C] dark:hover:text-white transition-all duration-200 active:scale-95 transition-transform"
            href="#"
            >Recursos</a
          >
          <a
            class="text-slate-500 dark:text-slate-400 font-medium hover:text-[#1A2B3C] dark:hover:text-white transition-all duration-200 active:scale-95 transition-transform"
            href="#"
            >Contacto</a
          >
        </div>
        <div class="hidden md:flex items-center gap-4">
          <a href="https://www.linkedin.com/in/antonia-moyano-silva-35183030b/"
            target="_blank"
            class="relative group flex items-center justify-center gap-2 font-label-md text-label-md border-2 border-[#0077b5] text-[#0077b5] px-2 py-2 rounded-xl hover:bg-[#0077b5] hover:text-white transition-all">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Ver Perfil Profesional
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 px-3 py-2 bg-[#0077b5] text-white text-sm font-medium rounded-lg shadow-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none z-10 before:absolute before:content-[''] before:w-2 before:h-2 before:bg-[#0077b5] before:rotate-45 before:-top-1 before:left-1/2 before:-translate-x-1/2">
              ¡Mira mi perfil!
            </div>
          </a>

          <a href="#seccion-reserva"
            class="relative group cursor-pointer font-label-md text-label-md text-sky-50 overflow-hidden rounded-lg px-6 py-2.5 hover:opacity-90 transition-all shadow-ambient-low flex items-center justify-center bg-sky-800">
            
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-40 h-40 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-sky-900"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-32 h-32 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-sky-800"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-24 h-24 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-sky-700"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-14 h-14 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-sky-600"></div>
            
            <span class="z-10 relative">Agendar Cita</span>
          </a>
        </div>
        <button class="md:hidden text-[#1A2B3C] dark:text-white p-2">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer class="bg-slate-900 text-white p-10 text-center mt-20">
      <p>© 2026 AsesoraTS Chile - Solución Profesional de Trabajo Social</p>
    </footer>
  </body>
</html>
