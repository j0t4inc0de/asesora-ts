<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonia Moyano - CV WEB</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              manrope: ["Manrope", "sans-serif"],
            },
            colors: {
              sky: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }

      .bg-diagonal-pattern {
        background-image: repeating-linear-gradient(
          45deg,
          #e0f2fe 0,
          #e0f2fe 1px,
          transparent 1px,
          transparent 12px
        );
      }

      #character-group,
      .pupil {
        transition: transform 0.1s ease-out;
      }
    </style>
  </head>
  <body
    class="bg-sky-50 text-sky-900 min-h-screen flex flex-col relative overflow-x-hidden"
  >
    <main
      class="flex-grow flex items-center justify-center relative w-full max-w-6xl mx-auto px-6 py-12"
    >
      <div
        class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-64 bg-diagonal-pattern z-0 hidden md:block opacity-60"
      ></div>

      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center w-full z-10"
      >
        <div>
          {% for item in portafolio %}
          <h1
            class="text-4xl md:text-5xl font-bold text-sky-950 leading-tight mb-4"
          >
            Hola, mi<br />nombre es
            <span class="text-sky-700">{{ item.nombre }}</span>.
          </h1>

          <p
            class="text-lg md:text-xl text-sky-800 font-medium leading-relaxed max-w-md mb-8"
          >
            {{ item.quienSoy }} con residencia en {{ item.ubicacion }}.
          </p>

          <h2
            class="text-4xl md:text-5xl font-bold text-sky-950 leading-tight mb-4"
          >
            Trabajemos juntos.
          </h2>

          <p
            class="text-base md:text-lg text-sky-800 font-medium leading-relaxed max-w-md mb-8"
          >
            {{ item.trabajemosJuntos }}
          </p>

          {% empty %}
          <h1 class="text-5xl font-bold text-sky-950 mb-6">
            Aún no hay datos.
          </h1>
          <p class="text-xl text-sky-800">No has creado el portafolio aún.</p>
          {% endfor %}
        </div>
      </div>
    </main>

    <div
      class="fixed bottom-0 left-12 flex flex-col items-center z-20 pointer-events-none hidden lg:flex"
    >
      <span
        class="text-xs tracking-widest text-sky-500 uppercase mb-4 origin-left -rotate-90 translate-y-[-200%]"
        >Scroll</span
      >
      <div class="w-px h-24 bg-sky-300"></div>
    </div>
  </body>
</html>
